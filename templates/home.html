<!DOCTYPE html>
<html>

<head>

    <title>Loan Prediction Form</title>

    <style>

        body{
            font-family: Arial;
            background-color: #f2f2f2;
        }

        .container{
            width: 50%;
            margin: auto;
            background: white;
            padding: 30px;
            margin-top: 30px;
            border-radius: 10px;
        }

        input, select{
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        button{
            width: 100%;
            padding: 12px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
        }

        h1{
            text-align: center;
        }

        h2{
            text-align: center;
            color: green;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Loan Approval Prediction</h1>

    <form action="/predictdata" method="post">

        <label>Gender</label>
        <select name="Gender">
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>

        <label>Married</label>
        <select name="Married">
            <option value="Yes">Yes</option>
            <option value="No">No</option>
        </select>

        <label>Dependents</label>
        <select name="Dependents">
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3+">3+</option>
        </select>

        <label>Education</label>
        <select name="Education">
            <option value="Graduate">Graduate</option>
            <option value="Not Graduate">Not Graduate</option>
        </select>

        <label>Self Employed</label>
        <select name="Self_Employed">
            <option value="Yes">Yes</option>
            <option value="No">No</option>
        </select>

        <label>Applicant Income</label>
        <input type="number" name="ApplicantIncome" required>

        <label>Coapplicant Income</label>
        <input type="number" name="CoapplicantIncome" required>

        <label>Loan Amount</label>
        <input type="number" name="LoanAmount" required>

        <label>Loan Amount Term</label>
        <input type="number" name="Loan_Amount_Term" required>

        <label>Credit History</label>
        <select name="Credit_History">
            <option value="1">1</option>
            <option value="0">0</option>
        </select>

        <label>Property Area</label>
        <select name="Property_Area">
            <option value="Urban">Urban</option>
            <option value="Semiurban">Semiurban</option>
            <option value="Rural">Rural</option>
        </select>

        <button type="submit">
            Predict Loan Status
        </button>

    </form>

    {% if results %}

    <h2>
        Prediction: {{ results }}
    </h2>

    {% endif %}

</div>

</body>

</html>
